name: ETL — FDA 483 Weekly Ingest

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      csv_file:
        description: "CSV file path"
        required: false
        default: "data/fda483_sample.csv"

jobs:
  etl:
    name: Ingest FDA 483 Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run ETL via Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          CSV="${{ github.event.inputs.csv_file || 'data/fda483_sample.csv' }}"
          node etl-rest.js --file "$CSV"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etl-log-${{ github.run_number }}
          path: data/
          retention-days: 7
