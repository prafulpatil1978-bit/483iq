name: ETL — FDA 483 Weekly Ingest

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:
    inputs:
      csv_file:
        description: "CSV file path"
        required: false
        default: "data/fda483_sample.csv"

jobs:
  etl:
    name: Ingest FDA 483 Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install pg
      - name: Run ETL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          CSV="${{ github.event.inputs.csv_file || 'data/fda483_sample.csv' }}"
          if [ -z "$DATABASE_URL" ]; then
            node --dns-result-order=ipv4first etl-fda483.js --file "$CSV" --dry-run
          else
            node --dns-result-order=ipv4first etl-fda483.js --file "$CSV"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etl-log-${{ github.run_number }}
          path: data/
          retention-days: 7
