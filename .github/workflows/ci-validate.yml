name: CI — Validate on Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate SPA structure
        run: |
          test -f index.html && echo "✅ index.html present" || (echo "❌ index.html missing" && exit 1)
          test -f netlify.toml && echo "✅ netlify.toml present"
          echo "📦 Netlify auto-deploy triggered via GitHub integration"
